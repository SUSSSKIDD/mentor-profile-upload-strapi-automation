name: Strapi Mentor Profile Upload

on:
  # Allows triggering from cronjob.org or other tools via API
  repository_dispatch:
    types: [trigger_upload]
  # Allows manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Upload Script
        env:
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_JWT: ${{ secrets.STRAPI_JWT }}
          CSV_SOURCE: ${{ secrets.CSV_SOURCE }}
        run: node upload_mentor_profiles.js
